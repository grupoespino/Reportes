<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Plagas</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding: 10px; }
        nav { background: #2c3e50; padding: 10px; display: flex; gap: 15px; border-radius: 5px; margin-bottom: 10px; }
        nav a { color: white; text-decoration: none; font-weight: bold; cursor: pointer; }
        .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .page { display: none; } .active { display: block; }
        input, select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 4px; color: white; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-reg { background: #27ae60; } .btn-sig { background: #3498db; }
        .btn-sm { padding: 2px 5px; font-size: 10px; width: auto; margin: 0 2px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 6px; text-align: left; }
    </style>
</head>
<body>

<nav>
    <a onclick="showPage('registro')">Registro</a>
    <a onclick="showPage('evaluacion')">Evaluación</a>
    <a onclick="showPage('dashboard')">Dashboard</a>
</nav>

<div id="registro" class="page active">
    <div class="card">
        <h3>Registrar Plaga</h3>
        <input type="text" id="nombrePlaga" placeholder="Nombre">
        <input type="text" id="nombreCientifico" placeholder="Científico">
        <button class="btn-reg" onclick="guardarPlaga()">Guardar</button>
        <h3>Lista de Plagas</h3>
        <table id="tablaPlagas"><thead><tr><th>Nombre</th><th>Científico</th><th>Acciones</th></tr></thead><tbody></tbody></table>
        <button class="btn-sig" style="background:#25d366; margin-top:10px;" onclick="enviarListaPlagas()">Enviar Lista a WhatsApp</button>
    </div>
</div>

<div id="evaluacion" class="page">
    <div class="card" id="formEvaluacion">
        <h3>Evaluación</h3>
        <input type="text" id="lote" placeholder="Lote (ej: Lote 1)">
        <input type="text" id="cultivo" placeholder="Cultivo (ej: Arándano)">
        <input type="number" id="numMuestras" placeholder="Total de muestras">
        <button class="btn-reg" onclick="iniciarEvaluacion()">Comenzar</button>
    </div>
    <div id="panelEvaluacion" class="card" style="display:none;">
        <h3 id="infoEvaluacion"></h3>
        <h3 id="tituloMuestra">Muestra 1</h3>
        <select id="selPlaga"></select>
        <select id="selParte"><option>Hoja</option><option>Flor</option><option>Tallo</option><option>Raíz</option></select>
        <input type="number" id="cantidadPlaga" placeholder="Cantidad">
        <button class="btn-reg" onclick="registrarDato()">Registrar en esta muestra</button>
        <div id="listaTemporal"></div>
        <button class="btn-sig" onclick="siguienteMuestra()">Siguiente Muestra</button>
        <button style="background:#e74c3c; margin-top:10px;" onclick="reiniciarEvaluacion()">Reiniciar Evaluación</button>
    </div>
</div>

<div id="dashboard" class="page">
    <div class="card">
        <h3>Reporte General</h3>
        <table id="tablaGeneral"><thead><tr><th>M</th><th>Plaga</th><th>Parte</th><th>Cant</th></tr></thead><tbody></tbody></table>
        <h3>Resumen por Plaga</h3>
        <table id="tablaResumen"><thead><tr><th>Plaga</th><th>Total</th><th>Prom</th><th>%</th></tr></thead><tbody></tbody></table>
        <button class="btn-reg" style="background:#25d366" onclick="enviarWhatsAppCompleto()">Enviar Reporte Completo</button>
        <button class="btn-sig" style="margin-top:10px;" onclick="enviarWhatsAppResumen()">Enviar Solo Resumen</button>
        <button style="background:#e74c3c; margin-top:10px;" onclick="reiniciarTodo()">Reiniciar Todo</button>
    </div>
</div>

<script>
    let plagas = JSON.parse(localStorage.getItem('plagas')) || [];
    let evaluaciones = JSON.parse(localStorage.getItem('evaluaciones')) || [];
    let muestraActual = 1;
    let totalMuestras = parseInt(localStorage.getItem('totalMuestras')) || 0;

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        renderDashboard();
        renderPlagas();
    }

    function guardarPlaga() {
        const nom = document.getElementById('nombrePlaga');
        const cie = document.getElementById('nombreCientifico');
        if(nom.value === "") return;
        plagas.push({nombre: nom.value, cie: cie.value});
        localStorage.setItem('plagas', JSON.stringify(plagas));
        nom.value = ""; cie.value = "";
        actualizarSelects();
        renderPlagas();
    }

    function renderPlagas() {
        document.querySelector('#tablaPlagas tbody').innerHTML = plagas.map((p, index) => 
            `<tr><td>${p.nombre}</td><td>${p.cie}</td><td>
            <button class="btn-sm btn-sig" onclick="editarPlagaConClave(${index})">Ed</button>
            <button class="btn-sm" style="background:red" onclick="eliminarPlagaConClave(${index})">X</button>
            </td></tr>`).join('');
    }

    function eliminarPlagaConClave(i) {
        const clave = prompt("Introduce la clave para eliminar:");
        if (clave === "2512") { plagas.splice(i, 1); localStorage.setItem('plagas', JSON.stringify(plagas)); renderPlagas(); actualizarSelects(); }
    }
    
    function editarPlagaConClave(i) {
        const clave = prompt("Introduce la clave para editar:");
        if (clave === "2512") {
            document.getElementById('nombrePlaga').value = plagas[i].nombre;
            document.getElementById('nombreCientifico').value = plagas[i].cie;
            plagas.splice(i, 1); localStorage.setItem('plagas', JSON.stringify(plagas)); renderPlagas();
        }
    }

    function enviarListaPlagas() {
        let msg = "Lista de Plagas:%0A" + plagas.map(p => `${p.nombre} (${p.cie})`).join('%0A');
        window.open(`https://wa.me/?text=${msg}`, '_blank');
    }

    function iniciarEvaluacion() {
        totalMuestras = parseInt(document.getElementById('numMuestras').value);
        const lote = document.getElementById('lote').value;
        const cultivo = document.getElementById('cultivo').value;
        localStorage.setItem('totalMuestras', totalMuestras);
        localStorage.setItem('infoLote', lote + " - " + cultivo);
        document.getElementById('infoEvaluacion').innerText = lote + " - " + cultivo;
        document.getElementById('formEvaluacion').style.display = 'none';
        document.getElementById('panelEvaluacion').style.display = 'block';
        actualizarSelects();
    }

    function reiniciarEvaluacion() {
        if(confirm("¿Reiniciar evaluación actual?")) {
            evaluaciones = [];
            localStorage.setItem('evaluaciones', JSON.stringify(evaluaciones));
            document.getElementById('formEvaluacion').style.display = 'block';
            document.getElementById('panelEvaluacion').style.display = 'none';
            muestraActual = 1;
        }
    }

    function registrarDato() {
        const data = {
            m: muestraActual,
            p: document.getElementById('selPlaga').value,
            pr: document.getElementById('selParte').value,
            c: Number(document.getElementById('cantidadPlaga').value) || 0
        };
        evaluaciones.push(data);
        localStorage.setItem('evaluaciones', JSON.stringify(evaluaciones));
        document.getElementById('listaTemporal').innerHTML += `<p style="font-size:12px; color:green;">✓ ${data.p} (${data.c})</p>`;
    }

    function siguienteMuestra() {
        if(muestraActual < totalMuestras) {
            muestraActual++;
            document.getElementById('tituloMuestra').innerText = "Muestra " + muestraActual;
            document.getElementById('listaTemporal').innerHTML = "";
        } else { alert("Evaluación finalizada"); }
    }

    function actualizarSelects() {
        document.getElementById('selPlaga').innerHTML = plagas.map(p => `<option>${p.nombre}</option>`).join('');
    }

    function renderDashboard() {
        document.querySelector('#tablaGeneral tbody').innerHTML = evaluaciones.map(e => 
            `<tr><td>${e.m}</td><td>${e.p}</td><td>${e.pr}</td><td>${e.c}</td></tr>`).join('');
        
        const resumen = {};
        let totalGeneral = 0;
        evaluaciones.forEach(e => {
            const cant = Number(e.c);
            if(!resumen[e.p]) resumen[e.p] = { suma: 0 };
            resumen[e.p].suma += cant;
            totalGeneral += cant;
        });

        const divisor = totalMuestras > 0 ? totalMuestras : 1;
        document.querySelector('#tablaResumen tbody').innerHTML = Object.keys(resumen).map(p => 
            `<tr><td>${p}</td><td>${resumen[p].suma}</td><td>${(resumen[p].suma / divisor).toFixed(1)}</td><td>${totalGeneral > 0 ? ((resumen[p].suma/totalGeneral)*100).toFixed(0) : 0}%</td></tr>`).join('');
    }

    function getResumenText() {
        const info = localStorage.getItem('infoLote') || "Sin Lote";
        let detalles = `Evaluación: ${info}%0AReporte Detallado:%0A` + evaluaciones.map(e => `M${e.m}: ${e.p} en ${e.pr} (${e.c})`).join('%0A');
        const resumen = {};
        let totalGeneral = 0;
        evaluaciones.forEach(e => {
            const cant = Number(e.c);
            if(!resumen[e.p]) resumen[e.p] = { suma: 0 };
            resumen[e.p].suma += cant;
            totalGeneral += cant;
        });
        const divisor = totalMuestras > 0 ? totalMuestras : 1;
        let resumenTxt = "%0A%0AResumen:%0A" + Object.keys(resumen).map(p => `${p}: Total ${resumen[p].suma}, Prom ${(resumen[p].suma / divisor).toFixed(1)}, ${totalGeneral > 0 ? ((resumen[p].suma/totalGeneral)*100).toFixed(0) : 0}%`).join('%0A');
        return { detalles, resumenTxt };
    }

    function enviarWhatsAppCompleto() {
        const { detalles, resumenTxt } = getResumenText();
        window.open(`https://wa.me/?text=${detalles}${resumenTxt}`, '_blank');
    }

    function enviarWhatsAppResumen() {
        const { resumenTxt } = getResumenText();
        const info = localStorage.getItem('infoLote') || "Sin Lote";
        window.open(`https://wa.me/?text=Evaluación: ${info}${resumenTxt}`, '_blank');
    }

    function reiniciarTodo() {
        const clave = prompt("Introduce la clave para reiniciar:");
        if (clave === "2512") { localStorage.clear(); location.reload(); } else { alert("Clave incorrecta"); }
    }
    
    renderPlagas();
    renderDashboard();
    actualizarSelects();
</script>
</body>
</html>
