<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema POS - Cosecha</title>
    <style>
        :root { --main: #1a2a6c; --sec: #b21f1f; --accent: #fdbb2d; --bg: #f8f9fa; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #e0eafc, #cfdef3); margin: 0; min-height: 100vh; padding: 10px; display: flex; flex-direction: column; }
        .section { display: none; }
        .active { display: block; }
        .container { max-width: 500px; margin: 20px auto; background: var(--white); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); flex-grow: 1; }
        input, select, button { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #eee; border-radius: 12px; box-sizing: border-box; font-size: 16px; transition: 0.3s; }
        button { background: var(--main); color: white; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        footer { text-align: center; font-size: 12px; color: #555; margin-top: auto; padding: 10px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; margin-top: 15px; }
        td { padding: 10px; background: #fff; border-bottom: 2px solid #f0f0f0; font-size: 14px; }
        header { display: flex; gap: 5px; margin-bottom: 20px; flex-wrap: wrap; }
        header button { margin: 0; padding: 10px; font-size: 11px; flex: 1; }
        h3 { color: var(--main); border-left: 5px solid var(--main); padding-left: 10px; }
    </style>
</head>
<body>

<div id="login" class="section active">
    <div class="container" style="margin-top: 50px;">
        <h2 style="text-align: center; color: var(--main);">Login🤯</h2>
        <input type="text" id="user" placeholder="Nombre Supervisor">
        <input type="password" id="pass" placeholder="Clave">
        <button onclick="verificar()">INGRESAR</button>
    </div>
</div>

<div id="app" class="section">
    <div class="container">
        <header id="menuHeader">
            <button onclick="show('asis')">ASIS.</button>
            <button onclick="show('avnc')">AVANCE</button>
            <button onclick="show('dash')">DASH</button>
        </header>

        <div id="asis" class="section active">
            <h3>Asistencia</h3>
            <input type="text" id="nom" placeholder="Nombre">
            <input type="text" id="apP" placeholder="Ap. Paterno">
            <input type="text" id="apM" placeholder="Ap. Materno">
            <button onclick="regAsis()">REGISTRAR PERSONAL</button>
            <button onclick="enviarListaCompleta()" style="background:#25d366">ENVIAR LISTA COMPLETA</button>
            <button onclick="enviarNombres()" style="background:#007bff">ENVIAR NOMBRES</button>
            <table id="tAsis"><tbody id="bAsis"></tbody></table>
        </div>

        <div id="avnc" class="section">
            <h3>Registro de Avance</h3>
            <select id="selP" onchange="mostrarHistorial()"></select>
            <input type="number" id="cant" placeholder="Kg">
            <input type="number" id="javas" placeholder="Javas">
            <button onclick="regAvance()">GUARDAR</button>
            <button onclick="sendWA(true)" style="background:#25d366">WA INDIVIDUAL</button>
            <table id="tAv"><tbody id="bAv"></tbody></table>
        </div>

        <div id="dash" class="section">
            <h3>Dashboard</h3>
            <button onclick="sendWA(false)" style="background:#25d366">REPORTE GRUPAL</button>
            <table id="tDash"><tbody id="bDash"></tbody></table>
        </div>

        <div id="cuenta" class="section">
            <h3>Nueva Cuenta Supervisor</h3>
            <input type="text" id="newU" placeholder="Nombre Supervisor">
            <input type="password" id="newP" placeholder="Clave">
            <button onclick="pedirClave('crear')">GUARDAR SUPERVISOR</button>
            <table id="tCuentas"><thead><tr><th>Supervisor</th><th>Acción</th></tr></thead><tbody id="bCuentas"></tbody></table>
            <button onclick="pedirClave('reset')" style="background:var(--sec); margin-top:30px;">REINICIAR SISTEMA</button>
        </div>
    </div>
    <footer>Creado por Andy Espino Alvarez - 914450843</footer>
</div>

<script>
    let supActual = "";
    function verificar() {
        let u = document.getElementById('user').value;
        let p = document.getElementById('pass').value;
        let cuentas = JSON.parse(localStorage.getItem('cuentas') || '[]');
        if((u === 'Admin' && p === '2512') || cuentas.find(c => c.u === u && c.p === p)) {
            supActual = u;
            document.getElementById('login').classList.remove('active');
            document.getElementById('app').classList.add('active');
            if(u === 'Admin' && p === '2512' && !document.getElementById('btnCuenta')) {
                let btn = document.createElement("button"); btn.id = "btnCuenta"; btn.innerHTML = "CREAR CUENTA";
                btn.onclick = function() { show('cuenta'); };
                document.getElementById('menuHeader').appendChild(btn);
            }
            renderAll(); renderCuentas();
        } else { alert('Acceso denegado'); }
    }

    function pedirClave(tipo, id) {
        let req = (tipo === 'crear') ? "25122512" : "2512";
        let clave = prompt("Ingrese clave de seguridad:");
        if(clave === req) {
            if(tipo === 'reset') { localStorage.clear(); location.reload(); }
            else if(tipo === 'borrar') { borrarPersonal(id); }
            else if(tipo === 'borrarCuenta') { borrarCuenta(id); }
            else if(tipo === 'crear') { ejecutarCrear(); }
            else if(tipo === 'salida') { registrarSalida(id); }
        } else { alert("Clave incorrecta"); }
    }

    function registrarSalida(id) {
        let d = JSON.parse(localStorage.getItem('asis') || '[]');
        let p = d.find(x => x.id === id);
        if(p) { p.salida = new Date().toLocaleTimeString(); localStorage.setItem('asis', JSON.stringify(d)); renderAll(); }
    }

    function enviarListaCompleta() {
        let asis = JSON.parse(localStorage.getItem('asis') || '[]');
        let msg = `LISTA DE ASISTENCIA COMPLETA (CON HORARIOS)\nSupervisor: ${supActual}\n\n`;
        msg += asis.map(a => `Personal: ${a.n}\nEntrada: ${a.ingreso}\nSalida: ${a.salida}\n---`).join('\n');
        window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
    }

    function enviarNombres() {
        let asis = JSON.parse(localStorage.getItem('asis') || '[]');
        let msg = `LISTA DE PERSONAL\nSupervisor: ${supActual}\n\n`;
        msg += asis.map(a => `- ${a.n}`).join('\n');
        window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
    }

    function ejecutarCrear() {
        let u = document.getElementById('newU').value;
        let p = document.getElementById('newP').value;
        if(!u || !p) return alert("Complete campos");
        let d = JSON.parse(localStorage.getItem('cuentas') || '[]');
        d.push({id: Date.now(), u: u, p: p});
        localStorage.setItem('cuentas', JSON.stringify(d));
        document.getElementById('newU').value = ""; document.getElementById('newP').value = "";
        renderCuentas();
    }

    function renderCuentas() {
        let d = JSON.parse(localStorage.getItem('cuentas') || '[]');
        document.getElementById('bCuentas').innerHTML = d.map(c => `<tr><td>${c.u}</td><td><button onclick="pedirClave('borrarCuenta', ${c.id})" style="background:var(--sec); padding:5px">X</button></td></tr>`).join('');
    }

    function borrarCuenta(id) {
        let d = JSON.parse(localStorage.getItem('cuentas'));
        localStorage.setItem('cuentas', JSON.stringify(d.filter(x => x.id !== id))); renderCuentas();
    }

    function show(id) {
        document.querySelectorAll('.container .section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'avnc') cargarSelect();
        if(id === 'dash') renderDash();
    }
    function regAsis() {
        let nom = document.getElementById('nom'), apP = document.getElementById('apP'), apM = document.getElementById('apM');
        let n = `${nom.value} ${apP.value} ${apM.value}`;
        if(!nom.value) return;
        let d = JSON.parse(localStorage.getItem('asis') || '[]');
        d.push({id: Date.now(), n: n, ingreso: new Date().toLocaleTimeString(), salida: "---"});
        localStorage.setItem('asis', JSON.stringify(d));
        nom.value = ""; apP.value = ""; apM.value = "";
        renderAll();
    }
    function renderAll() {
        let asis = JSON.parse(localStorage.getItem('asis') || '[]');
        document.getElementById('bAsis').innerHTML = asis.map(r => `<tr><td>${r.n}<br><small>Ent: ${r.ingreso} | Sal: ${r.salida}</small></td><td><button onclick="pedirClave('salida', ${r.id})" style="background:var(--accent); padding:5px; font-size:10px">SALIDA</button><button onclick="pedirClave('borrar', ${r.id})" style="background:var(--sec); padding:5px">X</button></td></tr>`).join('');
    }
    function borrarPersonal(id) {
        let d = JSON.parse(localStorage.getItem('asis'));
        localStorage.setItem('asis', JSON.stringify(d.filter(x => x.id !== id))); renderAll();
    }
    function regAvance() {
        let cant = document.getElementById('cant'), javas = document.getElementById('javas');
        let p = document.getElementById('selP').value;
        if(!p || !cant.value) return;
        let d = JSON.parse(localStorage.getItem('avance') || '[]');
        d.push({id: Date.now(), pid: p, c: cant.value, j: javas.value, h: new Date().toLocaleTimeString()});
        localStorage.setItem('avance', JSON.stringify(d));
        cant.value = ""; javas.value = "";
        mostrarHistorial();
    }
    function cargarSelect() {
        let d = JSON.parse(localStorage.getItem('asis') || '[]');
        document.getElementById('selP').innerHTML = '<option value="">Personal...</option>' + d.map(p => `<option value="${p.n}">${p.n}</option>`).join('');
    }
    function mostrarHistorial() {
        let n = document.getElementById('selP').value;
        let av = JSON.parse(localStorage.getItem('avance') || '[]');
        document.getElementById('bAv').innerHTML = av.filter(r => r.pid === n).map(r => `<tr><td>${r.h}</td><td>${r.c}kg</td><td><button onclick="borrarAvance(${r.id})" style="background:var(--sec); padding:5px">X</button></td></tr>`).join('');
    }
    function borrarAvance(id) {
        let d = JSON.parse(localStorage.getItem('avance') || '[]');
        localStorage.setItem('avance', JSON.stringify(d.filter(x => x.id !== id))); mostrarHistorial();
    }
    function renderDash() {
        let av = JSON.parse(localStorage.getItem('avance') || '[]');
        let totals = {};
        av.forEach(r => { if(r.pid) totals[r.pid] = (totals[r.pid] || 0) + parseFloat(r.c || 0); });
        document.getElementById('bDash').innerHTML = Object.keys(totals).map(k => `<tr><td><b>${k}</b></td><td>${totals[k]} Kg</td></tr>`).join('');
    }
    function sendWA(ind) {
        let asis = JSON.parse(localStorage.getItem('asis') || '[]');
        let av = JSON.parse(localStorage.getItem('avance') || '[]');
        let msg = `REPORTE - SUP: ${supActual}\n---------------------------\n`;
        if(ind) {
            let p = document.getElementById('selP').value;
            let ing = asis.find(a => a.n === p)?.ingreso || "N/A";
            msg += `Personal: ${p}\nEntrada: ${ing}\nAvances:\n` + av.filter(r => r.pid === p).map(r => `${r.h}: ${r.c}kg`).join('\n');
        } else {
            msg += "Personal | Entrada | Salida | Total Kg\n---------------------------\n";
            msg += asis.map(a => `${a.n} | ${a.ingreso} | ${a.salida} | ${av.filter(r => r.pid === a.n).reduce((s, r) => s + parseFloat(r.c || 0), 0)}kg`).join('\n');
        }
        window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
    }
</script>
</body>
</html>
